name: 每日热点话题飞书推送

on:
  schedule:
    # 每天北京时间 7:00（UTC+8 = UTC 23:00 前一天）
    - cron: '0 23 * * *'
  # 支持手动触发测试
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 拉取 hot-spot 数据（可选）
        uses: actions/checkout@v4
        with:
          repository: Irissunsun/hot-spot
          path: hot-spot
        continue-on-error: true

      - name: 安装 Python 依赖
        run: pip install openpyxl

      - name: 提取 KPI 数据
        run: |
          mkdir -p .tmp

          # 尝试查找真实数据文件
          DATA_FILE=$(find hot-spot -type f \( -name "*.json" -o -name "*.csv" -o -name "*.xlsx" \) 2>/dev/null | grep -v node_modules | head -1)

          if [ -n "$DATA_FILE" ] && [ -s "$DATA_FILE" ]; then
            echo "使用真实数据: $DATA_FILE"
            python3 Skills/daily-report/scripts/extract_hotspot_kpis.py "$DATA_FILE" --output .tmp/kpis.json
          else
            echo "未找到真实数据，使用模拟数据"
            # 生成模拟数据
            cat > .tmp/kpis.json << 'EOFDATA'
          {
            "total_topics": 1248,
            "hot_topics": 87,
            "total_engagement": 3820000,
            "avg_heat_score": 6823.5,
            "topics_growth": 12.3,
            "engagement_growth": 8.7,
            "top_topics": [
              {"name": "AI 大模型技术突破", "heat_score": 98500, "engagement": 520000, "platform": "微博", "url": "https://weibo.com/hot/search"},
              {"name": "新能源汽车销量创新高", "heat_score": 87200, "engagement": 430000, "platform": "抖音", "url": "https://www.douyin.com/search/新能源汽车"},
              {"name": "国产芯片研发进展", "heat_score": 76800, "engagement": 380000, "platform": "微博", "url": "https://weibo.com/hot/search"},
              {"name": "春季旅游热门目的地", "heat_score": 65400, "engagement": 290000, "platform": "小红书", "url": "https://www.xiaohongshu.com/explore"},
              {"name": "体育赛事精彩瞬间", "heat_score": 54100, "engagement": 210000, "platform": "抖音", "url": "https://www.douyin.com/search/体育赛事"}
            ],
            "platform_distribution": {
              "微博": 412,
              "抖音": 387,
              "小红书": 256,
              "知乎": 193
            }
          }
          EOFDATA
          fi

      - name: 推送到飞书
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python3 Skills/daily-report/scripts/send_feishu.py --kpis .tmp/kpis.json
