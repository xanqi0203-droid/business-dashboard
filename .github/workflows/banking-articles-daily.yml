name: 银行客户运营文章每日推送

on:
  schedule:
    # 每天北京时间 09:00（UTC 01:00）
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  send-articles:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行推送脚本
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python banking-articles-bot/send_banking_report.py

      - name: 推送失败通知到飞书
        if: failure()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          curl -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"text\",
              \"content\": {
                \"text\": \"⚠️ 银行客户运营文章推送失败\n时间：$(date '+%Y-%m-%d %H:%M:%S') (UTC)\n原因：GitHub Actions 运行出错，请检查 https://github.com/xanqi0203-droid/business-dashboard/actions\"
              }
            }"
